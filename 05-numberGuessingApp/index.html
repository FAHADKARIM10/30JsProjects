<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <p>Enter a guess between 0 to 100 </p>
    <form>
        <input class="user-input" type="number" placeholder="Enter a number" max="100" min="0" required>
       <div>
        <button class="submit-btn" type="submit">Submit</button>
        <button type="button" disabled class="start-game">Start Game</button>
       </div> 
    </form>
    <p class="result"></p>
    <p class="allGuessesArray"></p>

    
   
    

    <script  src="script.js"></script>
</body>
</html>
